name: eval-daily

# M7.6 — Daily 子集（hand_crafted ≥ 20 题，D13 第一档宽松档）
# 触发：每日 02:00 UTC+8（= UTC 18:00）+ 手动 workflow_dispatch
#
# 行为：
# - secrets EVAL_BACKEND_BASE_URL + EVAL_BACKEND_TOKEN 都配齐 → RUN_LIVE_EVAL=1
#   走 test_golden_v1_daily（真 backend + 真 LLM）+ smoke
# - 任一缺失 → 仅跑 smoke（canned graph，不烧 token）；不视作失败
# - 阈值未达 / 测试 fail → 自动开 GitHub issue（labels: eval, auto）
# - mock 验证：workflow_dispatch + inputs.mock_issue=true 时强制触发 issue 创建
#
# 详见 docs/03-development/06-evaluation-and-observability.md §0 / §12 M7.6

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      mock_issue:
        description: "Mock 验证：即便测试通过也创建一条 [MOCK] issue，用来确认 issue 创建路径"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: eval-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EVAL_REPORT_DIR: eval-results/ci-daily-${{ github.run_id }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      EVAL_BACKEND_BASE_URL: ${{ secrets.EVAL_BACKEND_BASE_URL }}
      EVAL_BACKEND_TOKEN: ${{ secrets.EVAL_BACKEND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Resolve live-eval mode
        id: mode
        run: |
          if [ -n "${EVAL_BACKEND_BASE_URL}" ] && [ -n "${EVAL_BACKEND_TOKEN}" ]; then
            echo "RUN_LIVE_EVAL=1" >> "$GITHUB_ENV"
            echo "mode=live" >> "$GITHUB_OUTPUT"
            echo "::notice::eval-daily running in LIVE mode (backend=${EVAL_BACKEND_BASE_URL})"
          else
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "::warning::EVAL_BACKEND_BASE_URL / EVAL_BACKEND_TOKEN 未配置 → 仅跑 smoke（canned graph），test_golden_v1_daily 会 skip。等 M8 上线 + HTTPS 后再补 secrets。"
          fi

      - name: Install backend dev deps
        run: |
          cd backend
          uv sync --extra dev

      - name: Run daily eval (pytest -m eval -k 'daily or smoke')
        id: eval
        run: |
          cd backend
          uv run pytest -m eval -q -k "daily or smoke"

      - name: Upload eval-results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-daily-${{ github.run_id }}
          path: eval-results/ci-daily-${{ github.run_id }}/
          if-no-files-found: ignore
          retention-days: 30

      - name: Open issue on failure / mock
        if: failure() || (github.event_name == 'workflow_dispatch' && inputs.mock_issue == true)
        uses: actions/github-script@v7
        with:
          script: |
            const isMock = context.eventName === 'workflow_dispatch'
              && context.payload.inputs
              && context.payload.inputs.mock_issue === 'true';
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = isMock
              ? `[MOCK] eval-daily auto-issue path verification — ${today}`
              : `eval-daily failed — ${today}`;
            const body = isMock
              ? `Mock 验证：via workflow_dispatch input \`mock_issue=true\`。\n\n如果本 issue 被创建 → daily auto-issue 路径已联通，可手动 close。\n\nRun: ${runUrl}`
              : `Daily eval (D13 第一档宽松) 阈值未达 / 测试失败。\n\nRun: ${runUrl}\n\n参考 \`docs/03-development/06-evaluation-and-observability.md §7\` 阈值定义。`;
            const labels = ['eval', 'auto'].concat(isMock ? ['mock'] : ['nightly-fail']);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
