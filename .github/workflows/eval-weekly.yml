name: eval-weekly

# M7.6 — Weekly 全集（v1.yaml ≥ 140 题，M7 期间宽松档 / M8 上线前 PR 收紧严格档）
# 触发：每周一 03:00 UTC+8（= 周日 UTC 19:00）+ 手动 workflow_dispatch
#
# 行为同 eval-daily.yml，唯独跑 -k "full or smoke" 全集；timeout 放宽到 120min。
#
# 详见 docs/03-development/06-evaluation-and-observability.md §0 / §12 M7.6

on:
  schedule:
    - cron: "0 19 * * 0"
  workflow_dispatch:
    inputs:
      mock_issue:
        description: "Mock 验证：即便测试通过也创建一条 [MOCK] issue，用来确认 issue 创建路径"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: eval-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EVAL_REPORT_DIR: eval-results/ci-weekly-${{ github.run_id }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      EVAL_BACKEND_BASE_URL: ${{ secrets.EVAL_BACKEND_BASE_URL }}
      EVAL_BACKEND_TOKEN: ${{ secrets.EVAL_BACKEND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Resolve live-eval mode
        id: mode
        run: |
          if [ -n "${EVAL_BACKEND_BASE_URL}" ] && [ -n "${EVAL_BACKEND_TOKEN}" ]; then
            echo "RUN_LIVE_EVAL=1" >> "$GITHUB_ENV"
            echo "mode=live" >> "$GITHUB_OUTPUT"
            echo "::notice::eval-weekly running in LIVE mode (backend=${EVAL_BACKEND_BASE_URL})"
          else
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "::warning::EVAL_BACKEND_BASE_URL / EVAL_BACKEND_TOKEN 未配置 → 仅跑 smoke（canned graph），test_golden_v1_full 会 skip。等 M8 上线 + HTTPS 后再补 secrets。"
          fi

      - name: Install backend dev deps
        run: |
          cd backend
          uv sync --extra dev

      - name: Run weekly eval (pytest -m eval -k 'full or smoke')
        id: eval
        run: |
          cd backend
          uv run pytest -m eval -q -k "full or smoke"

      - name: Upload eval-results artifact (results.json + report.md)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-weekly-${{ github.run_id }}
          path: eval-results/ci-weekly-${{ github.run_id }}/
          if-no-files-found: ignore
          retention-days: 90

      - name: Open issue on failure / mock
        if: failure() || (github.event_name == 'workflow_dispatch' && inputs.mock_issue == true)
        uses: actions/github-script@v7
        with:
          script: |
            const isMock = context.eventName === 'workflow_dispatch'
              && context.payload.inputs
              && context.payload.inputs.mock_issue === 'true';
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = isMock
              ? `[MOCK] eval-weekly auto-issue path verification — ${today}`
              : `eval-weekly failed — ${today}`;
            const body = isMock
              ? `Mock 验证：via workflow_dispatch input \`mock_issue=true\`。\n\n如果本 issue 被创建 → weekly auto-issue 路径已联通，可手动 close。\n\nRun: ${runUrl}`
              : `Weekly 全集评测 (M7 宽松档) 阈值未达 / 测试失败。\n\nRun: ${runUrl}\n\n参考 \`docs/03-development/06-evaluation-and-observability.md §7\` 阈值定义。`;
            const labels = ['eval', 'auto'].concat(isMock ? ['mock'] : ['weekly-fail']);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
