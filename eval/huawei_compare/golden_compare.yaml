  question: According to TS 29.244 clause 5.2.2.2.2, what formula is provided for calculating the value used to set the Time
    or Volume Threshold or Quota IE in the context of Credit pooling for EPC?
  expected_specs:
  - spec_id: '29.244'
    sections:
    - 5.2.2.2.2
  expected_facts:
  - The formula is S = Q1 * M1 + Q2 * M2 + ... + Qn * Mn
  - S is the calculated value for the Time or Volume Threshold or Quota IE
  - The formula is based on IETF RFC 4006
  - It is used for Credit Pool feature in EPC
  - Qn and Mn are variables representing quotas and multipliers
  - The calculation is specified according to the Measurement Method
  forbidden:
  - 5G Core
  - NGC
  - Next Generation Core
  source: hand_crafted
  notes: Tests recall of the formula for threshold calculation in EPC credit pooling.
  id: hc-form-003
- category: formula
  language: en
  question: According to TS 29.244, Clause 5.2.2.3.2, how is the usage U calculated for a URR when Aggregated URRs IE is included?
  expected_specs:
  - spec_id: '29.244'
    sections:
    - 5.2.2.3.2
  expected_facts:
  - The usage U is calculated as the sum of products of usage Cn and multiplier Mn.
  - Cn is the usage counted by each aggregated URR.
  - Mn is the multiplier for each aggregated URR.
  - The formula is C1*M1 + C2*M2 + ... + Cn*Mn = U.
  - The UP function applies this calculation when Aggregated URRs IE is present.
  - Aggregated URRs are indicated in the Aggregated URRs IE(s).
  forbidden:
  - U is the threshold value
  - Cn is the credit amount
  - Mn is the report trigger
  source: hand_crafted
  notes: Tests understanding of the credit pooling calculation formula in the 3GPP spec.
  id: hc-form-004
- category: formula
  language: en
  question: According to TS 33.501, Clause 13.2.4.4.1, how is the Nonce defined in the N32-f key hierarchy, and what are the
    initialization and increment rules for the SEQ component?
  expected_specs:
  - spec_id: '33.501'
    sections:
    - 13.2.4.4.1
  expected_facts:
  - Nonce is the concatenation of IV salt and SEQ
  - SEQ is a 32-bit unsigned integer
  - SEQ starts at zero
  - SEQ increments for each encryption invocation
  - A separate sequence counter is maintained per IV salt
  forbidden:
  - SEQ is a 16-bit integer
  - SEQ starts at one
  - SEQ is shared across IV salts
  source: hand_crafted
  notes: Tests understanding of the Nonce construction and SEQ behavior in N32-f.
  id: hc-form-005
