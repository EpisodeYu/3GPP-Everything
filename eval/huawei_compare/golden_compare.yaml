  question: According to TS 28.554 clause 6.5.1.1, what is the mathematical definition of the metric R2 and how does it relate
    to the 5GS service?
  expected_specs:
  - spec_id: '28.554'
    sections:
    - 6.5.1.1
  expected_facts:
  - R2 = (sum over QoS of QF.RelActNbr.QoS) / QF.SessionTimeUE
  - R2 is defined in the context of QoS flows
  - The service provided by 5GS is QoS flows
  - Applicable to SubNetwork and NRCellCU
  - Numerator involves QF.RelActNbr.QoS summed over QoS
  - Denominator is QF.SessionTimeUE
  forbidden:
  - R1
  - LTE
  source: hand_crafted
  notes: Tests retrieval of the formula and contextual definition from the 3GPP specification.
  id: hc-form-005
