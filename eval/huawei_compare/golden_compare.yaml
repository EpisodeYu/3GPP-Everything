  question: According to TS 22.104, clause C.4.4, what is the definition and mathematical formula for 'deviation' between
    an actual value and a target value, and what do the variables in the formula represent?
  expected_specs:
  - spec_id: '22.104'
    sections:
    - C.4.4
  expected_facts:
  - Deviation is defined as the discrepancy between actual value and target value.
  - The formula for deviation is Deviation(t_A) = t_A - t_R.
  - t_A represents the actual value.
  - t_R represents the target value.
  - In examples, with t_R=10, t_A=12 yields deviation 2, and t_A=9 yields deviation -1.
  forbidden:
  - deviation is always positive
  - this formula is from TS 23.501
  source: hand_crafted
  notes: Tests recall of the deviation concept, formula, and variables from the specified clause.
  id: hc-form-001
- category: formula
  language: en
  question: According to TS 23.401 Clause 4.3.33.5, what is the formula for calculating the Alternative IMSI value used for
    paging occasion determination in Multi-USIM UEs?
  expected_specs:
  - spec_id: '23.401'
    sections:
    - 4.3.33.5
  expected_facts:
  - Alternative IMSI value = [MCC] [MNC] [(MSIN value + Accepted IMSI Offset) mod (MSIN address space)]
  - The formula uses MCC, MNC, MSIN value, Accepted IMSI Offset, and MSIN address space
  - Accepted IMSI Offset is provided by MME in Attach Accept or TAU Accept
  - The calculation involves a modulo operation with MSIN address space
  - The result determines paging occasions to avoid collision
  forbidden:
  - Requested IMSI Offset in the formula
  - P-TMSI or other identifiers not in the formula
  - References to TS 24.301 or other specs
  source: hand_crafted
  notes: Tests recall and explanation of the Alternative IMSI value formula from the excerpt.
  id: hc-form-002
