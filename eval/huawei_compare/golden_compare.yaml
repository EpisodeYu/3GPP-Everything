  language: en
  question: According to TS 24.008 clause 8.3.1, what is the required behavior when an EMERGENCY SETUP or SETUP message is
    received with a transaction identifier not recognized as relating to an active call or a call in progress and with the
    transaction identifier flag incorrectly set to '1' in a network that does not support the 'Network initiated MO call'
    option?
  expected_specs:
  - spec_id: '24.008'
    sections:
    - 8.3.1
  expected_facts:
  - The message shall be ignored.
  - This applies to EMERGENCY SETUP or SETUP messages.
  - The transaction identifier is not recognized as active or in progress.
  - The transaction identifier flag is incorrectly set to '1'.
  - The network does not support the Network initiated MO call option (CCBS).
  - This rule applies to all mobile stations.
  forbidden:
  - 'Sending RELEASE COMPLETE with cause #81'
  - Releasing the MM connection
  source: hand_crafted
  notes: Tests understanding of specific call control handling rules for networks not supporting CCBS.
  id: hc-form-003
