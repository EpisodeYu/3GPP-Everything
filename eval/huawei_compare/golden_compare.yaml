  question: According to TS 36.108, what is the OTA total power dynamic range and how is its minimum requirement specified
    for SAN type 1-O?
  expected_specs:
  - spec_id: '36.108'
    sections:
    - 9.4.3.1
    - 9.4.3.2
  expected_facts:
  - OTA total power dynamic range is the difference between max and min transmit power of an OFDM symbol for a specified reference
    condition.
  - It applies at each RIB supporting transmission in the operating band.
  - Upper limit is the OFDM symbol power at maximum output power.
  - Lower limit is the OFDM symbol power when one resource block is transmitted.
  - For SAN type 1-O, the requirement is that it shall be larger than or equal to levels in table 6.3.3.2-1 for SAN type 1-H.
  forbidden:
  - SAN type 1-B
  - table 6.3.3.1-1
  source: hand_crafted
  notes: Tests understanding of the definition of OTA total power dynamic range and its specification for a specific SAN type.
  id: hc-def-006
