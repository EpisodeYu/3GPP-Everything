- category: definition
  language: en
  question: Describe the mechanism by which the MB-SMF ensures N2 MBS session requests are distributed to the correct NG RAN
    nodes when an AMF involved in shared delivery becomes unreachable or has lost its context.
  expected_specs:
  - spec_id: '23.527'
    sections:
    - 8.4.1.2
  expected_facts:
  - MB-SMF sends Namf_MBSCommunication_N2MessageTransfer Request to every AMF in the same AMF set.
  - The request includes a list of NG RAN Node IDs that have established shared delivery through the respective AMF.
  - AMF1 uses the list from MB-SMF if available, otherwise falls back to its locally stored list of NG RAN node IDs.
  - This distribution allows requests to reach NG RAN nodes even if AMFs have restarted and lost context.
  - The mechanism supports activation, deactivation, or update of MBS sessions when an AMF is unavailable.
  - Including the list in every request enables distribution via SCP reselection or AMF recovery.
  forbidden:
  - TS 23.247
  - clause 7.2.5.2
  source: hand_crafted
  notes: Tests understanding of MBS session request distribution resilience in the presence of AMF failures.
  id: hc-def-002
