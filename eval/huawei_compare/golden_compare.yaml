  question: Based on the abbreviations defined in clause 3.3 of TS 33.256, which acronyms are specific to Uncrewed Aerial
    Systems (UAS) and what do they stand for?
  expected_specs:
  - spec_id: '33.256'
    sections:
    - '3.3'
  expected_facts:
  - UAS stands for Uncrewed Aerial System
