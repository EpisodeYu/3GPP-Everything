  - Request indicates E-CID measurements and whether result is expected once or periodically.
  - NG-RAN node may configure UE using TS 36.331 or TS 38.331 for UE measurements.
  - If result once and measurement initiated, NG-RAN sends NRPPa E-CID MEASUREMENT INITIATION RESPONSE with measurements.
  - If result periodic and measurement initiated, NG-RAN sends NRPPa E-CID MEASUREMENT INITIATION RESPONSE without results
    and reports periodically.
  - If unable to initiate any measurements, NG-RAN sends NRPPa E-CID MEASUREMENT INITIATION FAILURE with error reason.
  - If failure occurs during periodic reporting, NG-RAN sends NRPPa E-CID MEASUREMENT FAILURE INDICATION.
  forbidden:
