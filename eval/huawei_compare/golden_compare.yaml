  - Resource URI is {apiRoot}/nbsf-management/<apiVersion>/subscriptions/{subId}.
  - Request body must include the BsfSubscription data structure.
  - '{subId} is the subscription correlation ID.'
  - Success responses are 200 OK with BsfSubscriptionResp or 204 No Content.
