  question: According to TS 23.003 clause 2.11, what is the method for constructing the 5G-S-TMSI, including the components
    involved and the formula used?
  expected_specs:
  - spec_id: '23.003'
    sections:
    - '2.11'
  expected_facts:
  - 5G-S-TMSI is constructed from AMF Set ID, AMF Pointer, and 5G-TMSI.
  - The formula is ⟨5G-S-TMSI⟩ = ⟨AMF Set ID⟩ ⟨AMF Pointer⟩ ⟨5G-TMSI⟩.
  - It is a shortened form of 5G-GUTI.
  - It enables more efficient radio signalling procedures like paging and Service Request.
  forbidden:
  - LTE-TMSI
  - MCC
  - MNC
  source: hand_crafted
  notes: Tests understanding of the 5G-S-TMSI structure and formula from the provided excerpt.
  id: hc-form-001
