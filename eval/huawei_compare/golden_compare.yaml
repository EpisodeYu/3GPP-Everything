  question: What are the possible representations of a DistinguishedName in string form, and how is a RegularDN structured
    according to the EBNF definition?
  expected_specs:
  - spec_id: '32.300'
    sections:
    - '7.3'
  expected_facts:
  - DistinguishedName is either NullDN or RegularDN.
  - RegularDN consists of DNPrefixPlusRDNSeparator and LocalDN.
  - DNPrefixPlusRDNSeparator can be with NullDNPrefix, with DomainComponentRDN, or without DomainComponentRDN.
  - LocalDN is composed of LocalRDN separated by RDNSeparator.
  - RDNSeparator includes optional RDNSeparatorWhiteSpace around a CommaChar.
  - DomainComponentRDN is defined as DCAttributeTypeAndValue.
  - RegularRDN is defined as RegularAttributeTypeAndValue.
  forbidden: []
  source: hand_crafted
  notes: Tests knowledge of the EBNF rules for DistinguishedName string representation.
  id: hc-def-012
