  question: Describe the process for generating the final keystream used in message-specific confidentiality protection for
    ProSe discovery messages, including the key derivation and input parameters to the ciphering algorithm.
  expected_specs:
  - spec_id: '33.503'
    sections:
    - A.7
  expected_facts:
  - The final keystream (KEYSTREAM) is obtained by ANDing output_keystream with a mask.
  - The mask is Encrypted_bits_mask concatenated with 0xFF..FF.
  - Input parameters include KEY, COUNT, BEARER, DIRECTION, LENGTH.
  - KEY is the 128 least significant bits of KDF output with DUCK, UTC-based counter, MIC.
  - COUNT is the UTC-based counter.
  - BEARER is 0x00.
  - DIRECTION is 0x00.
  forbidden:
  - TS 33.301
  - LTE security mechanisms
  - standard 5G confidentiality
  source: hand_crafted
  notes: Tests knowledge of keystream derivation and input parameters in ProSe discovery confidentiality.
  id: hc-form-004
- category: formula
