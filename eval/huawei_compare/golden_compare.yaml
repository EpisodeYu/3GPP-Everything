  language: en
  question: In TS 38.306, Clause 4.1.2, what is the mathematical expression provided for computing the approximate data rate
    in Mbps for aggregated carriers in NR?
  expected_specs:
  - spec_id: '38.306'
    sections:
    - 4.1.2
  expected_facts:
  - Formula is a summation over j from 1 to J
  - Includes variables v_Layers^(j), Q_m^(j), f^(j), R_max
  - Involves N_PRB^(BW(j),μ) multiplied by 12 and divided by T_s^μ
  - Contains overhead factor (1 - OH^(j))
  - Entire sum is multiplied by 10^{-6}
  forbidden:
  - LTE data rate formula
  source: hand_crafted
  notes: Tests recall of the NR data rate formula structure and key parameters.
  id: hc-form-010
- category: formula
  language: en
  question: In credit pooling as per TS 29.244, how is the usage U computed from the aggregated URRs and their multipliers?
  expected_specs:
  - spec_id: '29.244'
    sections:
    - 5.2.2.3.2
  expected_facts:
  - U is calculated as the sum of Cn*Mn for all aggregated URRs.
  - Cn is the usage counted by each aggregated URR.
  - Mn is the multiplier for each aggregated URR.
  - U represents the usage counted by the URR with aggregated URRs.
  - The formula applies when a URR is received with Aggregated URRs IE.
