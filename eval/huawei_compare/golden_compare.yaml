  question: Describe the structure of the 5G-S-TMSI and the requirements for allocating its 5G-TMSI part to support paging
    and connection establishment procedures.
  expected_specs:
  - spec_id: '23.501'
    sections:
    - 5.9.4
  expected_facts:
  - 5G-S-TMSI is defined as AMF Set ID concatenated with AMF Pointer and 5G-TMSI.
  - The 10 Least Significant Bits of the 5G-TMSI are used for paging timing by NG-RAN.
  - AMF must ensure even distribution of the 10 LSB of the 5G-TMSI.
  - RRC Connection Establishment contention resolution assumes low probability of same 5G-TMSI from different AMFs.
  - AMF allocation process for 5G-TMSI should account for low collision probability.
  - AMF could use a random seed for 5G-TMSI allocation to achieve this.
  forbidden:
  - GUTI
  - 5G-GUTI
  source: hand_crafted
  notes: Tests knowledge of the 5G-S-TMSI formula and related allocation considerations from the spec excerpt.
  id: hc-form-005
