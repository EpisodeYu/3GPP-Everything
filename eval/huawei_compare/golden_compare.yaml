  question: Describe the formula used to compute the power ramp-up adjustment for the first PUSCH transmission on the active
    uplink bandwidth part in UE behaviour, including its key variables and constraints.
  expected_specs:
  - spec_id: '38.213'
    sections:
    - 7.1.1
  expected_facts:
  - The adjustment is denoted as ΔP_rampup,b,f,c.
  - Calculation uses a min-max function structure.
  - 'Key terms: P_CMAX, 10*log10(2^μ * M_RB), P_O_PUSCH, alpha*PL_c, Δ_TF, δ_msg2.'
  - M_RB is the PUSCH bandwidth in resource blocks for the first transmission.
  - Δ_P_rampuprequested is the total power ramp-up requested by higher layers.
  - The result is constrained by 0 and the requested ramp-up value.
  forbidden:
  - TS 38.321
  - LTE
  - clause 7.1.1
  source: hand_crafted
  notes: Tests understanding of the PUSCH power ramp-up formula and its components.
  id: hc-form-002
