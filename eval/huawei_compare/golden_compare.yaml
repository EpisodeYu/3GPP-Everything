  question: What is the formula and method used by the UP function to compute the usage for a URR that includes an Aggregated
    URRs IE?
  expected_specs:
  - spec_id: '29.244'
    sections:
    - 5.2.2.3.2
  expected_facts:
  - Usage U is calculated as sum of (Cn * Mn) for all aggregated URRs.
  - 'Formula: C1*M1 + C2*M2 + ... + Cn*Mn = U.'
  - Cn is usage counted by each aggregated URR.
  - Mn is the multiplier for each aggregated URR.
  - The UP function applies multipliers and aggregates usage from Aggregated URRs IE.
  forbidden:
  - Simple summation without multipliers
  - Credit pooling not involved
  source: hand_crafted
  notes: Tests retrieval and understanding of the credit pooling formula mechanism.
  id: hc-form-007
- category: formula
  language: en
  question: What is the formula for calculating RA-RNTI when a UE is an NB-IoT device operating in TDD mode?
  expected_specs:
  - spec_id: '36.321'
    sections:
    - 5.1.4
  expected_facts:
  - RA-RNTI is computed as 1 + floor(SFN_id/4) + 256 * (H-SFN mod 2)
  - This formula applies to NB-IoT UEs in TDD mode
  - SFN_id is the index of the first radio frame of the specified PRACH
  - H-SFN is used in the term H-SFN mod 2
  forbidden:
  - carrier_id
  source: hand_crafted
  notes: Tests retrieval and understanding of the RA-RNTI calculation for a specific UE type and operation mode.
  id: hc-form-008
- category: formula
  language: en
  question: What is the formula for calculating nominal channel spacing in carrier aggregation for NR operating bands with
    a 15 kHz channel raster?
  expected_specs:
  - spec_id: '37.104'
    sections:
    - 4.6.1A
  expected_facts:
  - Nominal channel spacing uses a ceiling function.
  - Fraction involves BW_Channel(1) + BW_Channel(2) - 2 |GB_Channel(1) - GB_Channel(2)| divided by 0.015 * 2^{n+1}.
  - Result multiplied by 0.015 * 2^n MHz.
  - n is equal to μ_0.
  - Formula applies to NR bands with 15 kHz channel raster.
  forbidden:
  - 0.6 MHz
  - LTE CA channel spacing formula
  source: hand_crafted
  notes: Tests retrieval of the specific CA channel spacing formula for NR bands with 15 kHz raster, including variable definitions.
  id: hc-form-009
