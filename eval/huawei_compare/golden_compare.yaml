  question: According to TS 23.038 clause 6.2, what character sets are specified for SMS, CBS, USSD, and IEs in NAS messages,
    and what is the rationale for introducing UCS 2?
  expected_specs:
  - spec_id: '23.038'
    sections:
    - '6.2'
  expected_facts:
  - GSM 7 bit default alphabet is mandatory.
  - Support of other character sets is optional.
  - UCS 2 character set is essential to introduce.
  - UCS 2 addresses limitations of GSM 7 bit for Latin and non-Latin languages.
  - Applies to SMS, CBS, USSD, and IEs in NAS messages.
  forbidden:
  - GSM 7 bit is optional
  - UCS 2 is mandatory
  - Only applies to SMS
  source: hand_crafted
  notes: Tests understanding of character set requirements and the need for UCS 2 as per the excerpt.
  id: hc-def-001
