  question: Based on Table 6.2.3.3.1-5 in TS 26.532, what are the HTTP response headers supported for the 307 and 308 response
    codes in the Ndcaf_DataReportingProvisioning_RetrieveSession operation, including their data types, presence attributes,
    cardinalities, and any specified valid values or conditions?
  expected_specs:
  - spec_id: '26.532'
    sections:
    - 6.2.3.3.1
  expected_facts:
  - 'Location header: data type string, mandatory (M), cardinality 1, alternative URL description'
  - '3gpp-Sbi-Target-Nf-Id header: data type string, optional (O), cardinality 0..1, target NF identifier'
  - 'Access-Control-Allow-Origin header: data type string, optional (O), cardinality 0..1, supplied if Origin header included'
  - 'Access-Control-Allow-Methods header: valid values POST, PUT, DELETE'
  - 'Access-Control-Expose-Headers header: valid values Location'
  forbidden:
  - 200 OK
  - 404 Not Found
  - 500 Internal Server Error
  source: hand_crafted
  notes: Tests retrieval of specific table details for HTTP response headers in a 3GPP operation.
  id: hc-table-009
