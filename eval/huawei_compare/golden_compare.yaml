  question: Explain how the Time or Volume Threshold or Quota IE is set in a credit pool URR for EPC according to TS 29.244
    clause 5.2.2.2.2.
  expected_specs:
  - spec_id: '29.244'
    sections:
    - 5.2.2.2.2
  expected_facts:
  - The value S is calculated using the formula S = Q1 * M1 + Q2 * M2 + ... + Qn * Mn.
  - S represents the calculated value for the Time or Volume Threshold or Quota IE.
  - Each Qi is the threshold or quota from a URR sharing the credit pool.
  - Each Mi is the multiplier associated with the URR for abstract service units.
  - The formula aggregates contributions from multiple URRs in the credit pool.
  - Calculation is specified in IETF RFC 4006 according to the Measurement Method.
  forbidden: []
  source: hand_crafted
  notes: Tests retrieval and understanding of the credit pooling calculation formula in EPC.
  id: hc-form-008
