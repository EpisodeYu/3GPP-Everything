  question: Per TS 23.401 clause 4.3.33.5, what is the formula used to calculate the Alternative IMSI value for a Multi-USIM
    UE in the Paging Timing Collision Control mechanism, and what are its key components?
  expected_specs:
  - spec_id: '23.401'
    sections:
    - 4.3.33.5
  expected_facts:
  - Alternative IMSI value = [MCC] [MNC] [(MSIN value + Accepted IMSI Offset) mod (MSIN address space)]
  - Accepted IMSI Offset is provided by MME in Attach Accept or TAU Accept message
  - MSIN address space is used in the modulo operation
  - MCC and MNC are derived from the UE's IMSI
  - The formula involves the modulo operation with MSIN address space
  forbidden:
  - TMSI
  - P-TMSI
  - GUTI
  source: hand_crafted
  notes: Tests understanding of the Alternative IMSI calculation formula and its components for paging timing collision control.
  id: hc-form-010
- category: formula
  language: en
  question: What are the formulas for calculating the OTA reference sensitivity offset (Δ_OTAREFSENS) for the reference direction
    and for all other directions, and how is the offset for minimum sensitivity (Δ_minSENS) defined, as specified in TS 36.181
    clause 10.1?
  expected_specs:
  - spec_id: '36.181'
    sections:
    - '10.1'
  expected_facts:
  - Δ_OTAREFSENS = 44.1 - 10·log10(BeW_θ,REFSENS·BeW_φ,REFSENS) dB for reference direction
  - Δ_OTAREFSENS = 41.1 - 10·log10(BeW_θ,REFSENS·BeW_φ,REFSENS) dB for all other directions
  - Δ_minSENS = P_REFSENS - EIS_minSENS (dB)
  - Constants 44.1 and 41.1 distinguish reference from other directions
  - Beamwidths BeW_θ,REFSENS and BeW_φ,REFSENS are used in Δ_OTAREFSENS
  - Formulas are defined in clause 10.1 of TS 36.181
