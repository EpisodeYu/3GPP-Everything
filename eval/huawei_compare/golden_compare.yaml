  question: Describe the concept of earliness in terms of its calculation and conditions for non-zero values, based on the
    relationship between actual and target time.
  expected_specs:
  - spec_id: '22.104'
    sections:
    - C.4.5
  expected_facts:
  - Earliness is non-zero when actual time (t_A) is less than target time (t_R).
  - For t_A < t_R, Earliness(t_A) = t_R - t_A.
  - For t_A >= t_R, Earliness(t_A) = 0.
  - t_R denotes the target value.
  - t_A denotes the actual value.
  - In an example with t_R=10 and t_A=7, Earliness is 3.
  forbidden: []
  source: hand_crafted
  notes: Tests retrieval and explanation of the earliness formula and its application.
  id: hc-form-001
