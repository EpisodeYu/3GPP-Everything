    纯幻觉/事实性错误负样本。基站的 IP 地址属于传输网络层（OAM/传输网）概念，绝对不会通过无线物理层的同步信号（PSS/SSS）进行编码或广播。PSS/SSS 仅用于携带物理层小区标识（PCI）以供UE进行下行同步。如果 Agent 编造了 IPv6 到 PSS/SSS 序列的映射公式，即视为严重的幻觉。

