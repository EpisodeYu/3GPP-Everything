    伪造概念负样本。在 38.211 物理层规范中，PRACH Zadoff-Chu 序列的循环移位（Cyclic Shift, Cv）严格由高层配置的零相关区（zeroCorrelationZoneConfig）、逻辑根序列索引等无线参数通过公式计算得出。即使在 NTN（非地面网络）场景中，GPS/GNSS 信息也仅用于计算 Timing Advance (TA) 等高层补偿，绝对不存在“将GPS坐标直接代入公式调制PRACH序列循环移位”的物理层机制。

