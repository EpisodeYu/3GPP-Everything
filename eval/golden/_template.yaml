- id: hand-proc-003
  category: procedure
  language: zh
  source: hand_crafted
  question: |
    如果在一个search space中监听的 DCI format 0_0 在进行截断之前的信息位数大于调度同一服务小区使用的 DCI format 1_0 的有效载荷大小，此时应该如何处理？
  expected_specs:
    - spec_id: "38.212"
      sections:
        - "7.3.1.0"
  expected_facts:
    - 通过截断前面的最高有效位 (truncating the first few most significant bits)
    - 减小频域资源分配字段的位宽 (bitwidth of the frequency domain resource assignment field is reduced)
    - 使得 DCI format 0_0 的大小等于 DCI format 1_0 的大小
  forbidden:
    - 填充零 (padding zeros)
    - MAC CE
  must_say_not_found: false
  notes: |
    考查下行控制信息 (DCI) 解析流程中的大小对齐（截断机制）细节。

