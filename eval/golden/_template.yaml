# =============================================================================
# 手写金标准题模板（M7.0 / 2026-05-19 起用）
# =============================================================================
#
# 用法：
#   1. 复制本文件为 `eval/golden/v1.handwritten.yaml`（或直接编辑 v1.yaml 末尾）
#   2. 按下方 4 个示例一题题填，至少 20 题
#   3. 跑校验（2026-05-19 已落地）：
#         cd /data/3GPP-Everything && uv run --project eval \
#             python -m eval.cli golden validate -f eval/golden/v1.handwritten.yaml
#         # 可选：--json 输出机读格式；--strict-warnings 把 warning 也视为失败
#   4. 写题过程中随时看缺口（同 §3.4 目标分布对比 ±5 容差）：
#         uv run --project eval python -m eval.cli golden stats \
#             -f eval/golden/v1.handwritten.yaml
#   5. 写完 + 校验全绿 → 合并到 v1.yaml（跨文件 id 唯一性自动检查）：
#         uv run --project eval python -m eval.cli golden merge \
#             -i eval/golden/v1.yaml \
#             -i eval/golden/v1.handwritten.yaml \
#             -o eval/golden/v1.yaml
#         # 加 --dry-run 先预演不写文件
#
# 字段口径同 docs/03-development/06-evaluation-and-observability.md §3.5
# 与 eval/runner_retrieval.py::GoldenItem dataclass。
#
# 决策 1（2026-05-19，人 approve）：
#   - 全集（v1.yaml = teleqna 119 + hand-crafted ≥ 20）每周一次跑 nightly
#   - 手写题（source == 'hand_crafted'）每日跑 daily eval
#   → 写题时把 source 字段保持 'hand_crafted'，runner 用它切片
#
# 当前缺口（v1.yaml 截至 2026-05-19，119 题；2026-05-19 砍 tool category 后重分配）：
#   - definition  60   ← 已超目标 30（OVER；本期不再补）
#   - procedure   40   ← 已超目标 35（OK）
#   - table_lookup 12  ← 已超目标 10（OK）
#   - multi_section 3  ← 目标 12，缺 9  ★ 重点补
#   - formula     1    ← 目标 14，缺 13 ★ 重点补
#   - negative    3    ← 目标 19，缺 16 ★ 重点补（最大缺口）
# 优先补 negative / formula / multi_section 三类（顺序）。
# tool category 2026-05-19 砍掉：边界与 definition/table_lookup/multi_section
# 全部重叠 + runner 无法断言"工具调用路径"，详见 04-handoff/2026-05-19-m7.0-drop-tool.md。
#
# =============================================================================
# Series 选源推荐（2026-05-19）：20 题应该出自哪些 3GPP series
# =============================================================================
#
# 三轴交叉决定：
#   ① M6 实测 chunk 占比（草垛大 → 题面空间足）
#   ② 5G 重要度（项目本期 = 5G Rel-18/19；T1 核心 / T2 NSA-or-周边 / T3 低）
#   ③ v1.yaml 已覆盖缺口（哪些 5G 核心系列还没题）
#
# 数据来源：
#   - eval-results/source-audit/gsma_dataset_audit.md §3
#   - eval-results/m6-full-index/pipeline_stats.json
#   - v1.yaml 现有 119 题 spec_id 分布扫描（2026-05-19）
#
# 每系列 chunk 占比与重要度：
# ┌─────────┬──────────┬──────────────────────────┬───────────┬──────────────┐
# │ Series  │ chunk %  │ 主题                       │ 5G 重要度 │ v1.yaml 现有 │
# ├─────────┼──────────┼──────────────────────────┼───────────┼──────────────┤
# │ 38      │  30.8%   │ NR PHY/MAC/RRC/NGAP/F1AP  │ T1 核心   │ 56 题（47%） │
# │ 36      │  22.8%   │ E-UTRA / LTE RAN          │ T2 (NSA)  │ 10 题（8%）  │
# │ 29      │  12.7%   │ Service-based interfaces  │ T1 核心   │ 21 题（18%） │
# │ 23      │   8.2%   │ Stage 2 系统架构 / 流程    │ T1 核心   │ 42 题（35%） │
# │ 24      │   6.6%   │ NAS / Stage 3 信令         │ T1 核心   │ 10 题（8%）  │
# │ 37      │   5.1%   │ 多 RAT 协同                │ T2        │ 0            │
# │ 26      │   3.4%   │ 媒体 / Codec               │ T3        │ 0            │
# │ 32      │   3.2%   │ OAM / Charging             │ T3        │ 0            │
# │ 28      │   2.4%   │ Management / orchestration │ T3        │ 0            │
# │ 33      │   2.2%   │ Security                   │ T1 核心   │ 0 ★ 关键缺口 │
# │ 22      │   1.0%   │ Service requirements       │ T2        │ 0            │
# │ 其余    │  <1.5%   │ Stage 1 / SIM / 测试 / Crypto │ T3      │ 0            │
# └─────────┴──────────┴──────────────────────────┴───────────┴──────────────┘
#
# **20 题推荐配额（series × category 矩阵）**：
#
# ┌────────────────────┬──────────┬─────────┬──────────────┬────────┬──────┐
# │ Series             │ negative │ formula │ multi_section│ 小计   │ %    │
# ├────────────────────┼──────────┼─────────┼──────────────┼────────┼──────┤
# │ 38 NR RAN          │    1     │   4     │     1        │   6    │ 30%  │
# │ 23 Stage 2         │    1     │   0     │     3        │   4    │ 20%  │
# │ 33 Security ★      │    2     │   0     │     1        │   3    │ 15%  │
# │ 24 NAS             │    1     │   2     │     0        │   3    │ 15%  │
# │ 29 SBI             │    1     │   1     │     1        │   3    │ 15%  │
# │ 22 / 跨 series     │    2     │   0     │     0        │   2    │ 10%  │
# ├────────────────────┼──────────┼─────────┼──────────────┼────────┼──────┤
# │ 合计               │    8     │   7     │     5        │  20    │ 100% │
# └────────────────────┴──────────┴─────────┴──────────────┴────────┴──────┘
#
# 选源理由：
#   - 38 系 30%：占 chunk 池最大（NR 物理/RRC）；formula 主源（38.211/.212/.213/.214
#     的 MCS 表 / CQI 公式 / TBS 计算 / RE 数学），multi_section 来自 38.331 庞大 IE 树
#   - 23 系 20%：5G 系统语义核心；multi_section 主源（23.501 §5 / 23.502 §4 跨小节
#     合并；典型 "PDU Session Establishment 涉及的 NF 与消息序列"）
#   - **33 系 15% ★ v1.yaml 完全缺**：5G 核心系列里唯一 0 覆盖；本期必须补
#       • negative 例："5G NR 是否复用 EPS-AKA?" / "5G AKA 是否支持 GBA?"
#       • multi_section："5G primary authentication 端到端流程"（33.501 §6.1+§6.2）
#   - 24 系 15%：NAS / Stage 3 公式好题源（IE 长度 / 编码规则 / Security Mode IE 结构）
#   - 29 系 15%：SBI 数据模型多公式（OpenAPI schema 字段约束 / 响应码组合）
#   - 22 / 跨 series 10%：负样本主战场（Stage 1 高层需求易出"找不到"题；跨概念如
#     "5G UE MAC 地址" 类）
#
# **不推荐的系列**（写题时主动避开）：
#   - 36 系（LTE）：chunk 量大但属 4G/NSA 范畴，5G SA 不依赖；v1.yaml 已有 10 题够了
#   - 37 / 26 / 28 / 32（多 RAT / 媒体 / OAM）：T2/T3，本期 RAG 用户场景少
#   - 21 / 27 / 31 / 34 / 35（Stage 1 概览 / SIM / 测试 / Crypto）：极少被查
#
# 这是推荐不是硬约束。写题时若发现某 series 有"非补不可"的精彩反例（特别是 negative
# 类）可以超出表格，但要保持 §3.4 总分布在 ±5 容差内（用 `golden stats` 检查）。
# =============================================================================

version: 1
