items:

# -----------------------------------------------------------------------------
# 示例 1 · negative（必须明示"未找到"）
# -----------------------------------------------------------------------------
- id: hand-neg-001                 # 必填，建议 hand-{cat-缩写}-NNN，全局唯一
  category: negative               # 必填枚举
  language: en                     # 必填，'en' 或 'zh'
  source: hand_crafted             # 必填，固定 'hand_crafted'
  question: |                      # 必填，开放式问题，不要泄露选项
    What is the MAC address format used for a 5G UE PDU Session?
  expected_specs: []               # negative 必须空数组（"找不到"语义）
  expected_facts: []               # negative 通常为空；下面 must_say_not_found 才是关键
  forbidden:                       # 答案绝不能编造的字段；catch hallucination
    - "00:"                        # MAC 地址常见前缀
    - 48-bit
    - hexadecimal
  must_say_not_found: true         # negative 必填 true，answer 必须明示"未找到"
  notes: |                         # 选填但强烈建议：写一句"为什么这是负样本"
    UE 在 3GPP 规范里没有 MAC 地址语义；PDU Session 是 L3 概念。
    若 agent 编造 MAC 格式即视为 hallucination。

# -----------------------------------------------------------------------------
# 示例 2 · formula（公式查询）
# -----------------------------------------------------------------------------
- id: hand-formula-001
  category: formula
  language: en
  source: hand_crafted
  question: |
    According to TS 38.214, how is the CQI index mapped to MCS for PDSCH
    scheduled by PDCCH with DCI format 1_1 in NR?
  expected_specs:
    - spec_id: "38.214"            # 字符串；spec_id 一律用规范号 "38.214" 不是 "38214"
      sections:                    # 章节路径前缀数组；空数组 = 不限章节
        - "5.1.3"                  # 命中 5.1.3 / 5.1.3.1 / 5.1.3.2 都算
  expected_facts:                  # 关键事实点，至少 3-7 条；substring 命中即覆盖
    - MCS table
    - CQI table
    - Table 5.1.3.1
    - PDSCH
  forbidden:                       # 可空数组；防 hallucinate 的字段
    - LTE
    - 36.213                       # 错配到 LTE 规范号即扣分
  must_say_not_found: false        # 非 negative 一律 false（可省）
  notes: |
    NR PDSCH 的 CQI/MCS 映射来自 TS 38.214 §5.1.3 系列表；
    LTE 是 TS 36.213 §7，不要混。

# -----------------------------------------------------------------------------
# 示例 3 · formula（公式查询 — 第二个示例，强调与 38.214 系列对照）
# -----------------------------------------------------------------------------
- id: hand-formula-002
  category: formula
  language: en
  source: hand_crafted
  question: |
    According to TS 38.214, what is the formula used to derive the
    Transport Block Size (TBS) determination for PDSCH in NR?
  expected_specs:
    - spec_id: "38.214"
      sections:
        - "5.1.3.2"                # TBS determination
  expected_facts:
    - N_RE                         # 资源元素数
    - target code rate
    - quantized
    - Table 5.1.3.2
  forbidden:
    - LTE
    - 36.213
  must_say_not_found: false
  notes: |
    TBS determination 在 NR/LTE 都有，但公式不同。
    本题考验 retrieve 能精准命中 §5.1.3.2 而不是混到 §5.1.3.1（MCS table）。

# -----------------------------------------------------------------------------
# 示例 4 · multi_section（多章节合并推理，但**不跨 spec**——需求文档 §1.4）
# -----------------------------------------------------------------------------
- id: hand-multi-001
  category: multi_section
  language: en
  source: hand_crafted
  question: |
    List the NF and message sequence involved in 5G UE-requested PDU Session
    Establishment in HR-SBO scenario, per TS 23.502.
  expected_specs:
    - spec_id: "23.502"
      sections:
        - "4.3.2"                  # PDU Session Establishment
        - "4.3.5"                  # HR-SBO 相关
  expected_facts:
    - V-SMF
    - H-SMF
    - PDU Session Establishment Request
    - SM Context Request
    - HR-SBO                       # Home Routed - Selective Breakout
    - Nsmf_PDUSession_Create
  forbidden:
    - LBO                          # Local Breakout 是另一个场景
  must_say_not_found: false
  notes: |
    HR-SBO 是 R18 引入的家路由本地分流场景；多章节合并推理样本，
    考验 retrieve+rerank 召回多 section + generate 合并能力。

