- id: hand-proc-002
  category: procedure
  language: zh
  source: hand_crafted
  question: |
    如果配置了跳频，对于 PUCCH format 0，用于生成序列的cyclic shift的基础参数 m_cs 是如何确定的？
  expected_specs:
