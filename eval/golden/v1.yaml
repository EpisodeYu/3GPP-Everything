  question: What is the power saving scheme in NR that reduces UE power consumption by decreasing the number of PDCCH blind
    decoding operations?
  expected_specs:
  - spec_id: '38.331'
    sections: []
  expected_facts:
  - PDCCH skipping is a power saving mechanism.
  - It reduces the number of PDCCH blind decodings.
  - This leads to lower UE power consumption.
  - Introduced in 3GPP Release 16 for NR.
  - Configured via RRC to limit PDCCH monitoring.
  forbidden:
  - Triggering of PDCCH monitoring
  - Go-to-sleep signaling
  - Dynamic DRX configuration
