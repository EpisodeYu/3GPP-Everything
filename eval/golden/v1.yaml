  question: Define DL RS power in the context of 3GPP standards.
  expected_specs:
  - spec_id: '36.213'
    sections: []
  - spec_id: '38.214'
    sections: []
  expected_facts:
  - DL RS power is the resource element power of the Downlink Reference Symbol.
  - It measures power per resource element for downlink reference signals.
  - Associated with power control procedures in LTE and NR.
  - Used to indicate signal strength for reference symbols.
  - Stands for Downlink Reference Symbol power.
