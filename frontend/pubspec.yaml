name: tgpp
description: "3GPP-Everything Flutter client (web + android)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

# M5.0 只引子里程碑明确点名的依赖；其余按 docs/03-development/05-frontend.md §0
# 在对应子里程碑（M5.2 SSE / M5.3 markdown / M5.6 i18n）再加，避免提前拉依赖。
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_markdown_plus: ^1.0.0
  flutter_math_fork: ^0.7.2
  # markdown：flutter_markdown_plus 的传递依赖，显式列出是因为 M5.3 CitationInlineSyntax 直接
  # 引用 `package:markdown` 的 InlineSyntax / Element 类型（depend_on_referenced_packages lint）。
  markdown: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
