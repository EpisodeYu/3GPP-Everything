# M5.6 — Flutter web SPA 用 nginx 静态托管的 server 配置。
# 锚：docs/03-development/05-frontend.md §0 M5.6 / §14；docs/03-development/07-cicd-and-deployment.md
#
# 设计要点：
# - try_files $uri $uri/ /index.html  → SPA 路由（/chat /admin /reader/...）刷新不 404。
# - gzip 开 css/js/json/wasm，体积压缩；wasm 必须显式列出（默认 mime 表里没有）。
# - 缓存分两类：
#   * 带内容 hash 的资源（canvaskit/、assets/、字体、图片）→ long immutable cache。
#   * Flutter web 入口文件 main.dart.js / flutter_bootstrap.js / flutter.js /
#     flutter_service_worker.js / version.json 文件名**不带 hash**，重新部署名字不变；
#     若按 immutable 缓存，浏览器会一直用旧副本、新部署进不去（曾导致"部署了页面没变化"）。
#     这些入口文件 + index.html 一律 no-cache，靠 ETag/Last-Modified 走 304 协商缓存。
# - /api/v1/ 同源反代到 tgpp-api（容器名 `api`，8002）。
#   原因：M5.6 容器 web build 默认 `API_BASE_URL=/api/v1`（同源相对路径），浏览器只
#   需访问 :8082 一个端口。原来用 `http://localhost:8002/api/v1` 嵌入镜像，导致从
#   非 dev-box 浏览器访问 8082 时，所有 /api/v1 请求会指向用户机器的 localhost:8002
#   → 10s connect timeout。同源反代后跨机访问、Android 真机、生产 nginx 套壳都自然 work。
#   SSE 路径走同一 location，靠 `proxy_buffering off` 让 token 真流式到达。
# - 上游 `api` DNS 解析靠 docker network（tgpp-net）。若 web 容器与 api 容器不在同一
#   network，nginx 启动时不会立即报错（resolver 不要求），但首次请求 502。
#   `make dev` / `deploy/docker-compose.yml` 已把 web + api 都挂 tgpp-net。

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /api/v1/ 反代：浏览器 → :8082/api/v1/* → tgpp-api:8002/api/v1/*
    # 必须排在静态资源 location 之前匹配；FastAPI 路由全部挂在 /api/v1/ 前缀下。
    #
    # 用 docker 内置 DNS（127.0.0.11）+ 变量保存 upstream，让 nginx 启动时**不解析** `api`：
    # 1) `make web-docker` 出来的镜像在 CI smoke（`docker run` 不接 api 网络）里也能起来，
    #    只是 /api/v1 反代会 502，但 / + /admin 的静态 smoke 不受影响。
    # 2) tgpp-net 内部解析正常，请求时按 valid=30s 缓存。
    location /api/v1/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream api;
        proxy_pass http://$api_upstream:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式：禁用 nginx 缓冲 + 长 read timeout（后端 ping 15s）；
        # `X-Accel-Buffering: no` 在响应里给前置反代再加一遍保险（生产 prod nginx 套壳）。
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # 不带内容 hash 的入口文件：每次必须重新校验，否则新部署被旧 immutable 缓存挡住。
    # 注意：这条 regex location 必须排在下面通用静态资源 regex 之前（nginx regex 首个命中即用）。
    location ~* ^/(flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|flutter\.js|version\.json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # 带 hash / 版本化的资源走长 cache（canvaskit、assets、字体、图片等）。
    location ~* \.(?:js|css|wasm|woff2?|ttf|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # index.html 永远 no-cache，新部署立即生效。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback：所有未命中的路径回 index.html，由 go_router 接管。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
