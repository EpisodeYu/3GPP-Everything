# M5.6 — Flutter web SPA 用 nginx 静态托管的 server 配置。
# 锚：docs/03-development/05-frontend.md §0 M5.6 / §14；docs/03-development/07-cicd-and-deployment.md
#
# 设计要点：
# - try_files $uri $uri/ /index.html  → SPA 路由（/chat /admin /reader/...）刷新不 404。
# - gzip 开 css/js/json/wasm，体积压缩；wasm 必须显式列出（默认 mime 表里没有）。
# - main.dart.js / canvaskit 等带 hash 的静态资源 long cache；index.html 不缓存
#   保证用户拿到最新部署对应的 entrypoint。
# - sse / api 反代留给前置 nginx（deploy/docker-compose.prod.yml 的 reverse proxy
#   container），这个 server 只管静态文件。

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # 带 hash 的资源走长 cache。
    location ~* \.(?:js|css|wasm|woff2?|ttf|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # index.html 永远 no-cache，新部署立即生效。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback：所有未命中的路径回 index.html，由 go_router 接管。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
